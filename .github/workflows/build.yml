name: Build SafeStride APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config libffi-dev libssl-dev wget

      - name: Install Android SDK command line tools
        run: |
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          unzip /tmp/cmdtools.zip -d /tmp/cmdtools
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mv /tmp/cmdtools/cmdline-tools/* ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/

      - name: Accept Android licenses
        run: |
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager --licenses
          yes | ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          export ANDROIDSDK=~/.buildozer/android/platform/android-sdk
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeStride-APK
          path: bin/*.apk
