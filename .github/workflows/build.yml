name: Build SafeStride APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y git zip unzip autoconf libtool pkg-config libffi-dev libssl-dev

      - name: Accept Android licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33" || true

      - name: Install buildozer
        run: pip install buildozer cython

      - name: Build APK
        run: |
          export ANDROIDSDK=$ANDROID_HOME
          export ANDROIDNDK=$ANDROID_NDK_HOME
          export ANDROIDAPI=33
          export ANDROIDMINAPI=21
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SafeStride-APK
          path: bin/*.apk
